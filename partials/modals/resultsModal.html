<!-- =============================================================
         [MODAL-02] END GAME / RESULTS SCREEN
         Shows processed and unprocessed processes at the end.
    ============================================================== -->
    <div id="resultsModal" class="modal hidden">
        <div class="modal-card results-card">
            <h2 id="resultsTitle">RUN COMPLETE</h2>
            <div id="resultsSummary" class="results-summary"></div>
            <div class="result-lists">
                <div>
                    <h3>PROCESSED</h3>
                    <div id="processedList" class="result-list-box"></div>
                </div>
                <div>
                    <h3>UNPROCESSED</h3>
                    <div id="unprocessedList" class="result-list-box"></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button id="resultsRestartButton" class="cyan-button">RESTART</button>
                <button id="resultsTryAlgorithmButton" class="yellow-button">TRY ANOTHER ALGORITHM</button>
                <button id="resultsMenuButton" class="small-button">MENU</button>
            </div>
        </div>
    </div>
